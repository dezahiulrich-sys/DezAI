[phases.setup]
nixPkgs = [
    "ffmpeg",
    "libsndfile",
    "python311",
    "python311Packages.pip"
]

[phases.install]
cmds = [
    "pip install --upgrade pip",
    "pip install -r requirements.txt"
]

[phases.build]
cmds = []

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"

[environment]
PORT = "8000"
PYTHONUNBUFFERED = "true"
LOG_LEVEL = "INFO"