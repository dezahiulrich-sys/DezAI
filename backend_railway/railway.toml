[build]
builder = "nixpacks"
buildCommand = "pip install --upgrade pip && pip install -r requirements.txt"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/health"
healthcheckTimeout = 30

[[services]]
name = "dezai-backend"
port = 8000
protocol = "http"

[env]
PORT = "8000"
PYTHONUNBUFFERED = "true"
PYTHONPATH = "/app"
LOG_LEVEL = "INFO"

# Memory optimization for Demucs
[services.resources]
memory = 4096  # 4GB minimum for Demucs
cpu = 2
