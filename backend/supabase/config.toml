# Supabase Configuration for SoundForge AI

[project]
id = "your-project-id"
name = "soundforge-ai"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql-public"]
extra_search_path = ["public", "extensions"]
max_rows_per_page = 1000
row_level_security = true
statement_timeout = 30000

[db]
port = 54322
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true
ip_version = "ipv4"
max_header_length = 4096

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://soundforge-ai.netlify.app"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_email_change_enabled = true

[auth.sms]
enable_signup = true
enable_confirmations = false

# Edge Functions configuration
[edge_runtime]
enabled = true
policy = "oneshot"
max_request_duration_ms = 300000

# Analytics
[analytics]
enabled = true
port = 54327
backend = "postgres"